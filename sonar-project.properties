# ── SonarQube / SonarCloud project configuration ──────────────────────────────
sonar.projectKey=rentalapp-build
sonar.projectName=RentalApp-Build
sonar.projectVersion=1.0

# Source root — Django app lives under backend/
sonar.sources=backend
sonar.sourceEncoding=UTF-8

# Python language
sonar.language=py

# Exclusions — migrations auto-generated, no value scanning them
sonar.exclusions=\
  backend/**/migrations/**,\
  backend/**/__pycache__/**,\
  backend/**/tests/**,\
  backend/**/test_*.py,\
  backend/**/*_test.py

# Test sources (if present)
sonar.tests=backend
sonar.test.inclusions=\
  backend/**/tests/**,\
  backend/**/test_*.py,\
  backend/**/*_test.py

# Coverage report (generated by pytest-cov / coverage.py)
sonar.python.coverage.reportPaths=coverage.xml

# Bandit SAST report (security)
sonar.python.bandit.reportPaths=bandit-report.json

# Pylint report
sonar.python.pylint.reportPaths=pylint-report.txt

# Quality gate — set to false until test coverage is established.
# Re-enable (true) once Django tests are written and coverage >= 80%.
sonar.qualitygate.wait=false
