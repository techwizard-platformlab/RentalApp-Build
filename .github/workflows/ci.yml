name: CI — Lint · Security · SonarQube · Docker

on:
  # Auto triggers disabled during testing — enable after workflow is stable
  # push:
  #   branches: ["main", "develop"]
  # pull_request:
  #   branches: ["main", "develop"]
  workflow_dispatch:

# Cancel in-progress runs on the same branch when a new push arrives
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.12"
  DOCKERHUB_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/ai-rentalapp-ledger
  ACR_IMAGE: ${{ secrets.ACR_LOGIN_SERVER }}/rental-app-ledger

jobs:
  # ────────────────────────────────────────────────────────────────────────────
  # JOB 1 — Static analysis, security scan, unit tests + coverage
  # ────────────────────────────────────────────────────────────────────────────
  lint-and-security:
    name: Lint · Security · Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0        # full history required by SonarQube blame

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install runtime + analysis dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install \
            pytest pytest-django pytest-cov \
            pylint pylint-django \
            bandit

      # ── Pylint ──────────────────────────────────────────────────────────────
      - name: Pylint (code quality)
        run: |
          pylint backend \
            --load-plugins pylint_django \
            --django-settings-module=config.settings \
            --output-format=text \
            --ignore=migrations \
            --fail-under=7.0 \
            --reports=no \
            2>&1 | tee pylint-report.txt || true
        env:
          DJANGO_SETTINGS_MODULE: config.settings
          SECRET_KEY: ci-only-not-for-production

      # ── Bandit SAST ─────────────────────────────────────────────────────────
      - name: Bandit (SAST security scan)
        run: |
          bandit -r backend \
            --exclude backend/apps/*/migrations \
            --format json \
            --output bandit-report.json \
            --severity-level medium \
            --confidence-level medium || true
          bandit -r backend \
            --exclude backend/apps/*/migrations \
            --severity-level medium \
            --confidence-level medium || true

      # ── Django check ────────────────────────────────────────────────────────
      # --fail-level ERROR: W-level warnings (HSTS, SSL redirect) are advisory
      # and handled by the AKS ingress/load-balancer — not by Django directly.
      - name: Django system check
        working-directory: backend
        run: python manage.py check --deploy --fail-level ERROR
        env:
          DJANGO_SETTINGS_MODULE: config.settings
          # 50+ char, high-entropy key satisfies W009 for the CI check only
          SECRET_KEY: "ci-only-not-for-production-xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx"
          ALLOWED_HOSTS: localhost
          DEBUG: "false"
          # SSL is terminated at the load balancer — suppress W004/W008 for CI
          SECURE_HSTS_SECONDS: "31536000"
          SECURE_SSL_REDIRECT: "false"

      # ── Unit tests + coverage ───────────────────────────────────────────────
      - name: Run tests with coverage
        working-directory: backend
        run: |
          pytest \
            --ds=config.settings \
            --cov=. \
            --cov-report=xml:../coverage.xml \
            --cov-report=term-missing \
            -v || true
        env:
          DJANGO_SETTINGS_MODULE: config.settings
          SECRET_KEY: ci-only-not-for-production
          TESTING: "true"
          DEBUG: "true"

      - name: Upload analysis reports
        uses: actions/upload-artifact@v4
        with:
          name: analysis-reports
          path: |
            coverage.xml
            bandit-report.json
            pylint-report.txt
          retention-days: 7

  # ────────────────────────────────────────────────────────────────────────────
  # JOB 2 — SonarQube / SonarCloud scan
  # ────────────────────────────────────────────────────────────────────────────
  sonarqube:
    name: SonarQube Scan
    runs-on: ubuntu-latest
    needs: lint-and-security

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download analysis reports
        uses: actions/download-artifact@v4
        with:
          name: analysis-reports
          path: .

      # v6 fixes security vulnerability in v5; quality gate handled by
      # sonar.qualitygate.wait=true in sonar-project.properties
      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

  # ────────────────────────────────────────────────────────────────────────────
  # JOB 3 — Compute image tags (shared by both push jobs)
  # ────────────────────────────────────────────────────────────────────────────
  image-meta:
    name: Compute Image Tags
    runs-on: ubuntu-latest
    needs: sonarqube
    outputs:
      short_sha: ${{ steps.meta.outputs.short_sha }}
      tags_suffix: ${{ steps.meta.outputs.tags_suffix }}
    steps:
      - name: Compute tags
        id: meta
        run: |
          SHORT_SHA="${GITHUB_SHA::8}"
          echo "short_sha=$SHORT_SHA" >> "$GITHUB_OUTPUT"
          # e.g.  :sha-a1b2c3d4  :latest  (on main)  or  :develop  (on develop)
          BRANCH="${GITHUB_REF_NAME//\//-}"
          echo "tags_suffix=$BRANCH-$SHORT_SHA" >> "$GITHUB_OUTPUT"

  # ────────────────────────────────────────────────────────────────────────────
  # JOB 4 — Push to Docker Hub
  # ────────────────────────────────────────────────────────────────────────────
  push-dockerhub:
    name: Push to Docker Hub
    runs-on: ubuntu-latest
    needs: image-meta

    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & push to Docker Hub
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.DOCKERHUB_IMAGE }}:latest
            ${{ env.DOCKERHUB_IMAGE }}:${{ needs.image-meta.outputs.tags_suffix }}
          cache-from: type=registry,ref=${{ env.DOCKERHUB_IMAGE }}:buildcache
          cache-to: type=registry,ref=${{ env.DOCKERHUB_IMAGE }}:buildcache,mode=max
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.title=RentalApp API

  # ────────────────────────────────────────────────────────────────────────────
  # JOB 5 — Push to Azure ACR (for AKS pulls)
  # ────────────────────────────────────────────────────────────────────────────
  push-acr:
    name: Push to Azure ACR
    runs-on: ubuntu-latest
    needs: image-meta

    steps:
      - uses: actions/checkout@v4

      - name: Azure login (client secret)
        run: |
          az login \
            --service-principal \
            --username "${{ secrets.AZURE_CLIENT_ID }}" \
            --password "${{ secrets.AZURE_CLIENT_SECRET }}" \
            --tenant  "${{ secrets.AZURE_TENANT_ID }}"
          az account set --subscription "${{ secrets.AZURE_SUBSCRIPTION_ID }}"

      - name: Login to ACR
        run: az acr login --name "${{ secrets.ACR_NAME }}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push to ACR
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.ACR_IMAGE }}:latest
            ${{ env.ACR_IMAGE }}:${{ needs.image-meta.outputs.short_sha }}
            ${{ env.ACR_IMAGE }}:${{ needs.image-meta.outputs.tags_suffix }}
          cache-from: type=registry,ref=${{ env.ACR_IMAGE }}:buildcache
          cache-to: type=registry,ref=${{ env.ACR_IMAGE }}:buildcache,mode=max

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign ACR image (keyless cosign)
        run: |
          IMAGE_DIGEST=$(docker buildx imagetools inspect \
            "${{ env.ACR_IMAGE }}:${{ needs.image-meta.outputs.short_sha }}" \
            --format '{{.Manifest.Digest}}')
          cosign sign --yes "${{ env.ACR_IMAGE }}@${IMAGE_DIGEST}"

  # ────────────────────────────────────────────────────────────────────────────
  # JOB 6 — Summary
  # ────────────────────────────────────────────────────────────────────────────
  summary:
    name: Summary
    runs-on: ubuntu-latest
    needs: [push-dockerhub, push-acr]
    if: always()
    steps:
      - name: Job summary
        run: |
          echo "## CI Build Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Registry | Image | Tag |" >> "$GITHUB_STEP_SUMMARY"
          echo "|----------|-------|-----|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Docker Hub | \`${{ env.DOCKERHUB_IMAGE }}\` | \`${{ needs.image-meta.outputs.tags_suffix }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Azure ACR  | \`${{ env.ACR_IMAGE }}\` | \`${{ needs.image-meta.outputs.short_sha }}\` |" >> "$GITHUB_STEP_SUMMARY"
