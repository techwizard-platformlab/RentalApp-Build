name: CI — Lint · Security · SonarQube · Docker

on:
  # Auto triggers disabled during testing — enable after workflow is stable
  # push:
  #   branches: ["main", "develop"]
  # pull_request:
  #   branches: ["main", "develop"]
  workflow_dispatch:
    inputs:
      registry:
        description: "Registry to push image to"
        required: false
        default: "dockerhub"
        type: choice
        options:
          - dockerhub
          - acr
          - gcr
          - all

# Cancel in-progress runs on the same branch when a new push arrives
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.12"
  DOCKERHUB_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/ai-rentalapp-ledger
  ACR_IMAGE: ${{ secrets.ACR_LOGIN_SERVER }}/rental-app-ledger
  GCR_IMAGE: ${{ secrets.GCR_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/rental-app/rental-app-ledger

jobs:
  # ────────────────────────────────────────────────────────────────────────────
  # JOB 1 — Static analysis, security scan, unit tests + coverage
  # ────────────────────────────────────────────────────────────────────────────
  lint-and-security:
    name: Lint · Security · Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          fetch-depth: 0        # full history required by SonarQube blame

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install runtime + analysis dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install \
            pytest pytest-django pytest-cov \
            pylint pylint-django \
            bandit

      # ── Pylint ──────────────────────────────────────────────────────────────
      - name: Pylint (code quality)
        run: |
          pylint backend \
            --load-plugins pylint_django \
            --django-settings-module=config.settings \
            --output-format=text \
            --ignore=migrations \
            --fail-under=7.0 \
            --reports=no \
            2>&1 | tee pylint-report.txt || true
        env:
          DJANGO_SETTINGS_MODULE: config.settings
          SECRET_KEY: ci-only-not-for-production

      # ── Bandit SAST ─────────────────────────────────────────────────────────
      - name: Bandit (SAST security scan)
        run: |
          bandit -r backend \
            --exclude backend/apps/*/migrations \
            --format json \
            --output bandit-report.json \
            --severity-level medium \
            --confidence-level medium || true
          bandit -r backend \
            --exclude backend/apps/*/migrations \
            --severity-level medium \
            --confidence-level medium || true

      # ── Django check ────────────────────────────────────────────────────────
      # --fail-level ERROR: W-level warnings (HSTS, SSL redirect) are advisory
      # and handled by the AKS ingress/load-balancer — not by Django directly.
      - name: Django system check
        working-directory: backend
        run: python manage.py check --deploy --fail-level ERROR
        env:
          DJANGO_SETTINGS_MODULE: config.settings
          # 50+ char, high-entropy key satisfies W009 for the CI check only
          SECRET_KEY: "ci-only-not-for-production-xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx"
          ALLOWED_HOSTS: localhost
          DEBUG: "false"
          # SSL is terminated at the load balancer — suppress W004/W008 for CI
          SECURE_HSTS_SECONDS: "31536000"
          SECURE_SSL_REDIRECT: "false"

      # ── Unit tests + coverage ───────────────────────────────────────────────
      - name: Run tests with coverage
        working-directory: backend
        run: |
          pytest \
            --ds=config.settings \
            --cov=. \
            --cov-report=xml:../coverage.xml \
            --cov-report=term-missing \
            -v || true
        env:
          DJANGO_SETTINGS_MODULE: config.settings
          SECRET_KEY: ci-only-not-for-production
          TESTING: "true"
          DEBUG: "true"

      - name: Upload analysis reports
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: analysis-reports
          path: |
            coverage.xml
            bandit-report.json
            pylint-report.txt
          retention-days: 7

  # ────────────────────────────────────────────────────────────────────────────
  # JOB 2 — SonarQube / SonarCloud scan
  # ────────────────────────────────────────────────────────────────────────────
  sonarqube:
    name: SonarQube Scan
    runs-on: ubuntu-latest
    needs: lint-and-security

    steps:
      - name: Checkout source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          fetch-depth: 0

      - name: Download analysis reports
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4
        with:
          name: analysis-reports
          path: .

      # v6 fixes security vulnerability in v5.
      # continue-on-error: quality gate is non-blocking until tests are written.
      # Re-enable blocking once Django test coverage >= 80%.
      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@fd88b7d7ccbaefd23d8f36f73b59db7a3d246602  # v6
        continue-on-error: true
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

  # ────────────────────────────────────────────────────────────────────────────
  # JOB 3 — Compute image tags (shared by all push jobs)
  # ────────────────────────────────────────────────────────────────────────────
  image-meta:
    name: Compute Image Tags
    runs-on: ubuntu-latest
    needs: sonarqube
    outputs:
      short_sha: ${{ steps.meta.outputs.short_sha }}
      tags_suffix: ${{ steps.meta.outputs.tags_suffix }}
    steps:
      - name: Compute tags
        id: meta
        run: |
          SHORT_SHA="${GITHUB_SHA::8}"
          echo "short_sha=$SHORT_SHA" >> "$GITHUB_OUTPUT"
          # e.g.  :sha-a1b2c3d4  :latest  (on main)  or  :develop  (on develop)
          BRANCH="${GITHUB_REF_NAME//\//-}"
          echo "tags_suffix=$BRANCH-$SHORT_SHA" >> "$GITHUB_OUTPUT"

  # ────────────────────────────────────────────────────────────────────────────
  # JOB 4 — Push to Docker Hub
  # Default registry — runs when input is "dockerhub" (default) or "all"
  # ────────────────────────────────────────────────────────────────────────────
  push-dockerhub:
    name: Push to Docker Hub
    runs-on: ubuntu-latest
    needs: image-meta
    if: |
      github.event.inputs.registry == '' ||
      github.event.inputs.registry == 'dockerhub' ||
      github.event.inputs.registry == 'all'

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130  # v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f  # v3

      - name: Log in to Docker Hub
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9  # v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & push to Docker Hub
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8  # v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.DOCKERHUB_IMAGE }}:latest
            ${{ env.DOCKERHUB_IMAGE }}:${{ needs.image-meta.outputs.tags_suffix }}
          cache-from: type=registry,ref=${{ env.DOCKERHUB_IMAGE }}:buildcache
          cache-to: type=registry,ref=${{ env.DOCKERHUB_IMAGE }}:buildcache,mode=max
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.title=RentalApp API

  # ────────────────────────────────────────────────────────────────────────────
  # JOB 5 — Push to Azure ACR (for AKS pulls)
  # Runs when input is "acr" or "all"
  # ────────────────────────────────────────────────────────────────────────────
  push-acr:
    name: Push to Azure ACR
    runs-on: ubuntu-latest
    needs: image-meta
    if: |
      github.event.inputs.registry == 'acr' ||
      github.event.inputs.registry == 'all'
    permissions:
      id-token: write   # required for cosign keyless signing via GitHub OIDC
      contents: read

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Azure login (client secret)
        run: |
          az login \
            --service-principal \
            --username "${{ secrets.AZURE_CLIENT_ID }}" \
            --password "${{ secrets.AZURE_CLIENT_SECRET }}" \
            --tenant  "${{ secrets.AZURE_TENANT_ID }}"
          az account set --subscription "${{ secrets.AZURE_SUBSCRIPTION_ID }}"

      - name: Login to ACR
        run: az acr login --name "${{ secrets.ACR_NAME }}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f  # v3

      - name: Build & push to ACR
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8  # v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.ACR_IMAGE }}:latest
            ${{ env.ACR_IMAGE }}:${{ needs.image-meta.outputs.short_sha }}
            ${{ env.ACR_IMAGE }}:${{ needs.image-meta.outputs.tags_suffix }}
          cache-from: type=registry,ref=${{ env.ACR_IMAGE }}:buildcache
          cache-to: type=registry,ref=${{ env.ACR_IMAGE }}:buildcache,mode=max

      - name: Install cosign
        uses: sigstore/cosign-installer@398d4b0eeef1380460a10c8013a76f728fb906ac  # v3

      - name: Sign ACR image (keyless cosign)
        run: |
          IMAGE_DIGEST=$(docker buildx imagetools inspect \
            "${{ env.ACR_IMAGE }}:${{ needs.image-meta.outputs.short_sha }}" \
            | grep "^Digest:" | awk '{print $2}')
          cosign sign --yes "${{ env.ACR_IMAGE }}@${IMAGE_DIGEST}"

      # Keep only the last 5 versioned tags; latest + buildcache are excluded
      # by their patterns. Untagged manifests (old cosign sigs etc.) also pruned.
      - name: Prune old ACR tags (keep last 5)
        run: |
          REPO=$(echo "${{ env.ACR_IMAGE }}" | cut -d'/' -f2-)

          # Short-sha tags  e.g. 4e4e3616
          az acr run --registry "${{ secrets.ACR_NAME }}" \
            --cmd "acr purge --filter '${REPO}:[0-9a-f]{8}' --ago 0d --keep 5" \
            /dev/null

          # Branch-sha tags  e.g. main-4e4e3616
          az acr run --registry "${{ secrets.ACR_NAME }}" \
            --cmd "acr purge --filter '${REPO}:.*-[0-9a-f]{8}' --ago 0d --keep 5" \
            /dev/null

          # Untagged manifests (old cosign signatures, dangling layers)
          az acr run --registry "${{ secrets.ACR_NAME }}" \
            --cmd "acr purge --filter '${REPO}:.*' --ago 1d --untagged" \
            /dev/null

  # ────────────────────────────────────────────────────────────────────────────
  # JOB 6 — Push to Google Artifact Registry (GCR)
  # Runs when input is "gcr" or "all"
  # Required secrets: GCP_PROJECT_ID, GCP_SERVICE_ACCOUNT, GCR_REGION,
  #                   GCP_WORKLOAD_IDENTITY_PROVIDER
  # ────────────────────────────────────────────────────────────────────────────
  push-gcr:
    name: Push to Google AR
    runs-on: ubuntu-latest
    needs: image-meta
    if: |
      github.event.inputs.registry == 'gcr' ||
      github.event.inputs.registry == 'all'
    permissions:
      id-token: write   # required for GCP OIDC + cosign keyless signing
      contents: read

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: GCP OIDC login
        uses: google-github-actions/auth@c200f3691d83b41bf9bbd8638997a462592937ed  # v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Configure Docker for GAR
        run: gcloud auth configure-docker ${{ secrets.GCR_REGION }}-docker.pkg.dev --quiet

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f  # v3

      - name: Build & push to Google AR
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8  # v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.GCR_IMAGE }}:latest
            ${{ env.GCR_IMAGE }}:${{ needs.image-meta.outputs.short_sha }}
            ${{ env.GCR_IMAGE }}:${{ needs.image-meta.outputs.tags_suffix }}
          cache-from: type=registry,ref=${{ env.GCR_IMAGE }}:buildcache
          cache-to: type=registry,ref=${{ env.GCR_IMAGE }}:buildcache,mode=max
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.title=RentalApp API

      - name: Install cosign
        uses: sigstore/cosign-installer@398d4b0eeef1380460a10c8013a76f728fb906ac  # v3

      - name: Sign GAR image (keyless cosign)
        run: |
          IMAGE_DIGEST=$(docker buildx imagetools inspect \
            "${{ env.GCR_IMAGE }}:${{ needs.image-meta.outputs.short_sha }}" \
            | grep "^Digest:" | awk '{print $2}')
          cosign sign --yes "${{ env.GCR_IMAGE }}@${IMAGE_DIGEST}"

  # ────────────────────────────────────────────────────────────────────────────
  # JOB 7 — Summary
  # ────────────────────────────────────────────────────────────────────────────
  summary:
    name: Summary
    runs-on: ubuntu-latest
    needs: [image-meta, push-dockerhub, push-acr, push-gcr]
    if: always()
    steps:
      - name: Job summary
        run: |
          REGISTRY="${{ github.event.inputs.registry }}"
          REGISTRY="${REGISTRY:-dockerhub}"

          echo "## CI Build Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Registry selection:** \`$REGISTRY\`" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Registry | Image | Tag | Status |" >> "$GITHUB_STEP_SUMMARY"
          echo "|----------|-------|-----|--------|" >> "$GITHUB_STEP_SUMMARY"

          if [[ "$REGISTRY" == "dockerhub" || "$REGISTRY" == "all" ]]; then
            echo "| Docker Hub | \`${{ env.DOCKERHUB_IMAGE }}\` | \`${{ needs.image-meta.outputs.tags_suffix }}\` | ${{ needs.push-dockerhub.result }} |" >> "$GITHUB_STEP_SUMMARY"
          fi
          if [[ "$REGISTRY" == "acr" || "$REGISTRY" == "all" ]]; then
            echo "| Azure ACR  | \`${{ env.ACR_IMAGE }}\` | \`${{ needs.image-meta.outputs.short_sha }}\` | ${{ needs.push-acr.result }} |" >> "$GITHUB_STEP_SUMMARY"
          fi
          if [[ "$REGISTRY" == "gcr" || "$REGISTRY" == "all" ]]; then
            echo "| Google AR  | \`${{ env.GCR_IMAGE }}\` | \`${{ needs.image-meta.outputs.short_sha }}\` | ${{ needs.push-gcr.result }} |" >> "$GITHUB_STEP_SUMMARY"
          fi
